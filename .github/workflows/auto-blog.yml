name: Auto Blog Post

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 generate_blog.py

      - name: Commit and push
        run: |
          git config --global user.email "autopaybot@github.com"
          git config --global user.name "AutoPayBot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto blog: $(date '+%Y-%m-%d-%H%M%S')"
          git push
